
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <title>197_XY_20260717</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    :root {
      --gold: #ede183;
      --dark: #1f2933;
      --muted: #6b7280;
      --border: #e5e7eb;
      --bg: #f8fafc;
      --card: #ffffff;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.14);
    }

    html, body {
      margin: 0;
      height: 100%;
      font-family: Inter, Arial, sans-serif;
      color: var(--dark);
      background: var(--bg);
    }

    #container {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    #sidebar {
      width: 280px;
      background: rgba(255, 255, 255, 0.96);
      border-right: 1px solid var(--border);
      box-shadow: 8px 0 24px rgba(15, 23, 42, 0.08);
      padding: 16px;
      overflow-y: auto;
      transition: transform 0.22s ease, width 0.22s ease, padding 0.22s ease;
      z-index: 1000;
    }

    #sidebar.closed {
      width: 0;
      padding-left: 0;
      padding-right: 0;
      border: none;
      transform: translateX(-100%);
      overflow: hidden;
    }

    .sidebar-header {
      margin-bottom: 14px;
    }

    .sidebar-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 4px;
    }

    .sidebar-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin: 0;
    }

    .club-count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f3f0cf;
      color: #5f520f;
      font-size: 12px;
      font-weight: 700;
    }

    #club-search {
      width: 100%;
      box-sizing: border-box;
      margin: 12px 0 14px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      font-size: 13px;
      background: #ffffff;
    }

    #club-search:focus {
      border-color: #cfb65e;
      box-shadow: 0 0 0 3px rgba(207, 182, 94, 0.18);
    }

    #club-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-item {
      cursor: pointer;
      padding: 11px 12px;
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }

    .sidebar-item:hover {
      transform: translateY(-1px);
      border-color: #cfb65e;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.10);
    }

    .sidebar-item.active {
      border-color: #cfb65e;
      background: #fffbe6;
    }

    .club-name {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .club-address {
      font-size: 11px;
      line-height: 1.35;
      color: var(--muted);
    }

    #map {
      flex-grow: 1;
      background: #dbeafe;
    }

    #toggle-btn {
      position: absolute;
      top: 85px;
      left: 298px;
      z-index: 1001;
      width: 38px;
      height: 38px;
      background: #00855e;
      border: none;
      cursor: pointer;
      border-radius: 999px;
      box-shadow: var(--shadow);
      transition: left 0.22s ease, transform 0.12s ease;
      font-size: 22px;
      font-weight: 900;
      color: white;
      text-align: center;
    }

    #toggle-btn:hover {
      transform: scale(1.04);
    }

    #sidebar.closed ~ #toggle-btn {
      left: 16px;
    }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: var(--shadow) !important;
    }

    .leaflet-control-zoom a {
      border: none !important;
      color: #111827 !important;
      font-weight: 800;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .leaflet-popup-content {
      margin: 14px;
      width: 420px !important;
    }

    .popup-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .popup-address {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .leaflet-popup-content img {
      width: 420px;
      max-width: none;
      border-radius: 12px;
      display: block;
    }

    @media (max-width: 700px) {
      #sidebar {
        width: 250px;
      }

      #toggle-btn {
        left: 268px;
      }
    }
  </style>
</head>
<body>
  <div id="container">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1 class="sidebar-title">Selected screens</h1>
        <p class="sidebar-subtitle">Click a club to zoom on the map</p>
        <div class="club-count">
          <span id="club-count-number">0</span> screens
        </div>
      </div>

      <input id="club-search" type="text" placeholder="Search screen..." />
      <div id="club-list"></div>
    </aside>

    <div id="map"></div>
    <button id="toggle-btn" aria-label="Toggle sidebar">‹</button>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
      function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    const map = L.map('map');

    L.tileLayer('https://api.maptiler.com/maps/streets-v2/{z}/{x}/{y}.png?key=zvozfVXSoJcPXkNFc6gI', {
      tileSize: 512,
      zoomOffset: -1,
      crossOrigin: true
    }).addTo(map);

    const clubs = [{"id":"Golfclub Princenbosch","address":"Bavelseweg 153, 5124 PX Molenschot, Nederland","lng":4.87356,"lat":51.54806,"imglink":""}];

    const golfIcon = L.icon({
      iconUrl: 'https://golf-media.github.io/maps/golf_hole_icon.png',
      iconSize: [45, 45],
      iconAnchor: [22, 22],
      popupAnchor: [0, -45]
    });

    const sidebar = document.getElementById("sidebar");
    const clubList = document.getElementById("club-list");
    const clubSearch = document.getElementById("club-search");
    const clubCountNumber = document.getElementById("club-count-number");

    const bounds = [];
    const items = [];

    clubCountNumber.textContent = clubs.length;

    clubs.forEach((club) => {
      const safeId = escapeHtml(club.id);
      const safeAddr = escapeHtml(club.address);

      const popupHTML =
        '<div class="popup-title">' + safeId + '</div>' +
        '<div class="popup-address">' + safeAddr + '</div>' +
        (club.imglink ? '<img src="' + club.imglink + '" alt="' + safeId + '">' : '');

      const marker = L.marker([club.lat, club.lng], { icon: golfIcon })
        .addTo(map)
        .bindPopup(popupHTML);

      bounds.push([club.lat, club.lng]);

      const item = document.createElement("div");
      item.className = "sidebar-item";
      item.dataset.search = (club.id + " " + club.address).toLowerCase();

      item.innerHTML =
        '<div class="club-name">' + safeId + '</div>' +
        '<div class="club-address">' + safeAddr + '</div>';

      item.onclick = () => {
        document.querySelectorAll(".sidebar-item.active").forEach(el => {
          el.classList.remove("active");
        });

        item.classList.add("active");
        map.setView([club.lat, club.lng], 14);
        marker.openPopup();
      };

      clubList.appendChild(item);
      items.push(item);
    });

    clubSearch.addEventListener("input", () => {
      const query = clubSearch.value.trim().toLowerCase();

      items.forEach(item => {
        item.style.display = item.dataset.search.includes(query) ? "" : "none";
      });
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, {
        paddingTopLeft: [330, 40],
        paddingBottomRight: [40, 40],
        maxZoom: 13
      });
    } else {
      map.setView([50.5039, 4.4699], 8);
    }

    const toggleBtn = document.getElementById("toggle-btn");

    toggleBtn.addEventListener("click", () => {
      sidebar.classList.toggle("closed");
      toggleBtn.textContent = sidebar.classList.contains("closed") ? "›" : "‹";

      setTimeout(() => {
        map.invalidateSize();
      }, 230);
    });
  </script>
</body>
</html>

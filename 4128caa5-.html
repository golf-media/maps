<head>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
    }

    #container {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    #sidebar {
      width: 200px;
      background: #f4f4f4;
      border-right: 1px solid #ccc;
      padding: 8px;
      overflow-y: auto;
      transition: width 0.1s ease;
    }

    #sidebar.closed {
      width: 0;
      padding: 0;
      border: none;
    }

    #map {
      flex-grow: 1;
    }

    #toggle-btn {
      position: absolute;
      top: 80px;
      left: 200px;
      z-index: 1001;
      background: white;
      border: 1px solid #ccc;
      padding: 5px 10px;
      cursor: pointer;
      border-radius: 4px;
      box-shadow: 0 0 3px rgba(0,0,0,0.2);
      transition: left 0.1s ease;
    }

    #sidebar.closed ~ #toggle-btn {
      left: 10px;
    }

    .sidebar-item {
      cursor: pointer;
      padding: 6px;
      margin-bottom: 4px;
      background: white;
      border-radius: 4px;
      border: 1px solid #ddd;
      font-size: 13px;
    }

    .sidebar-item:hover {
      background: #e8f0fe;
    }

    .leaflet-popup-content img {
      width: 300px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <div id="container">
    <div id="sidebar"></div>
    <div id="map"></div>
    <button id="toggle-btn"><</button>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
      function escapeHtml(s) {
      return String(s ?? "").replace(/[&<>"']/g, (ch) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[ch]));
    }

    const map = L.map('map');

    L.tileLayer('https://api.maptiler.com/maps/streets-v2/{z}/{x}/{y}.png?key=zvozfVXSoJcPXkNFc6gI', {
      tileSize: 512,
      zoomOffset: -1,
      crossOrigin: true
    }).addTo(map);

 Blicquylaan 7, 1933 Zaventem","lng":4.5127,"lat":50.84143,"imglink":"https://www.golfmedia.be/screen-images/the-national.jpg"},{"id":"Royal Waterloo Golf Club","address":"Vieux Chemin de Wavre 50, 1380 Lasne","lng":4.44768,"lat":50.6923,"imglink":"https://www.golfmedia.be/screen-images/waterloo.jpg"},{"id":"Golf du Bercuit","address":"Les Gottes 3, 1390 Grez-Doiceau","lng":4.67489677017854,"lat":50.7185636825219,"imglink":"https://www.golfmedia.be/screen-images/bercuit.jpg"},{"id":"Golf de Rigenee","address":"Rue du Chatelet 62, 1495 Villers-la-Ville","lng":4.52784,"lat":50.56659,"imglink":"https://www.golfmedia.be/screen-images/rigenee.jpg"},{"id":"Golf de La Bruyere","address":"Rue Jumeree 1, 1495 Villers-la-Ville","lng":4.49857,"lat":50.54393,"imglink":"https://www.golfmedia.be/screen-images/la-bruyere.jpg"},{"id":"Golf de La Bawette Indoor","address":"Chau. du Chateau de Bawette 5, 1300 Wavre","lng":4.59980800901725,"lat":50.7298105226225,"imglink":""},{"id":"Pro1Golf Louvain La Neuve","address":"Dreve du Golf 1, 1348 Ottignies-Louvain-la-Neuve","lng":4.6144,"lat":50.6683,"imglink":"https://www.golfmedia.be/screen-images/pro1-louvain-la-neuve.jpg"},{"id":"Tervuren Golf Club","address":"Hertswegenstraat 59, 3080 Tervuren","lng":4.53627058749565,"lat":50.822034082257,"imglink":"https://www.golfmedia.be/screen-images/park-tervuren.jpg"},{"id":"Golf Club des 7 Fontaines","address":"Chau. d'Alsemberg 1021, 1420 Braine-l'Alleud","lng":4.34402165856389,"lat":50.7192628188865,"imglink":""},{"id":"Golfclub Krokkebaas","address":"Kasteelstraat 161, 9255 Buggenhout","lng":4.21033021487264,"lat":51.001761242631,"imglink":""},{"id":"Golf L’Empereur Indoor","address":"Rue Emile Francois 31, 1474 Genappe","lng":4.47737,"lat":50.63367,"imglink":"https://www.golfmedia.be/screen-images/lempereur-indoor.jpg"},{"id":"Golf L’Empereur Outdoor","address":"Rue Emile Francois 31, 1474 Genappe","lng":4.47737,"lat":50.63367,"imglink":"https://www.golfmedia.be/screen-images/lempereur-outd     const golfIcon = L.icon({
      iconUrl: 'https://golf-media.github.io/maps/green-golf.png',
      iconSize: [30, 30],
      iconAnchor: [15, 15],
      popupAnchor: [0, -30]
    });

    const sidebar = document.getElementById("sidebar");
    const bounds = [];

    clubs.forEach((club) => {
      const safeId = escapeHtml(club.id);
      const safeAddr = escapeHtml(club.address);

      const popupHTML = '<strong>' + safeId + '</strong><br><p>' + safeAddr + '</p>' +
                        (club.imglink ? '<img src="' + club.imglink + '">' : '');

      const marker = L.marker([club.lat, club.lng], { icon: golfIcon }).addTo(map).bindPopup(popupHTML);
      bounds.push([club.lat, club.lng]);

      const item = document.createElement("div");
      item.className = "sidebar-item";
      item.textContent = club.id;
      item.onclick = () => {
        map.setView([club.lat, club.lng], 14);
        marker.openPopup();
      };
      sidebar.appendChild(item);
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [30, 30] });
    } else {
      map.setView([50.5039, 4.4699], 8);
    }

    const toggleBtn = document.getElementById("toggle-btn");
    toggleBtn.addEventListener("click", () => {
      sidebar.classList.toggle("closed");
      toggleBtn.textContent = sidebar.classList.contains("closed") ? ">" : "<";
    });
  </script>
</body>

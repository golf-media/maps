  <style>
    :root {
      --gold: #ede183;
      --dark: #1f2933;

    html, body {

      color: var(--dark);
      background: var(--bg);

    #container {

      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    #sidebar {

      padding: 16px;
      overflow-y: auto;
      transition: transform 0.22s ease, width 0.22s ease, padding 0.22s ease;
      z-index: 1000;
    }

    #sidebar.closed {
      width: 0;
      padding-left: 0;
      padding-right: 0;
      border: none;
      transform: translateX(-100%);
      overflow: hidden;
    }

    .sidebar-header {
      margin-bottom: 14px;
    }

    .sidebar-title {
      font-size: 17px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 0 0 4px;
    }

    .sidebar-subtitle {
      font-size: 12px;
      color: var(--muted);
      margin: 0;
    }

    .club-count {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
      padding: 5px 9px;
      border-radius: 999px;
      background: #f3f0cf;
      color: #5f520f;
      font-size: 12px;
      font-weight: 700;
    }

    #club-search {
      width: 100%;
      box-sizing: border-box;
      margin: 12px 0 14px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      outline: none;
      font-size: 13px;
      background: #ffffff;
    }

    #club-search:focus {
      border-color: #cfb65e;
      box-shadow: 0 0 0 3px rgba(207, 182, 94, 0.18);
    }

    #club-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sidebar-item {
      cursor: pointer;
      padding: 11px 12px;
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--border);
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
      transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    }

    .sidebar-item:hover {
      transform: translateY(-1px);
      border-color: #cfb65e;
      box-shadow: 0 8px 18px rgba(15, 23, 42, 0.10);
    }

    .sidebar-item.active {
      border-color: #cfb65e;
      background: #fffbe6;
    }

    .club-name {
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .club-address {
      font-size: 11px;
      line-height: 1.35;
      color: var(--muted);
    }

    #map {
      flex-grow: 1;
      background: #dbeafe;
    }

    #toggle-btn {
      position: absolute;
      top: 85px;
      left: 298px;
      z-index: 1001;
      width: 38px;
      height: 38px;
      background: #00855e;
      border: none;
      cursor: pointer;
      border-radius: 999px;
      box-shadow: var(--shadow);
      transition: left 0.22s ease, transform 0.12s ease;
      font-size: 22px;
      font-weight: 900;
      color: white;
      text-align: center;
    }

    #toggle-btn:hover {
      transform: scale(1.04);
    }

    #sidebar.closed ~ #toggle-btn {
      left: 16px;
    }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: var(--shadow) !important;
    }

    .leaflet-control-zoom a {
      border: none !important;
      color: #111827 !important;
      font-weight: 800;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 16px;
      box-shadow: var(--shadow);
    }

    .leaflet-popup-content {
      margin: 14px;
      width: 420px !important;
    }

    .popup-title {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .popup-address {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.4;
      margin-bottom: 10px;
    }

    .leaflet-popup-content img {
      width: 420px;
      max-width: none;
      border-radius: 12px;
      display: block;
    }

    @media (max-width: 700px) {
      #sidebar {
        width: 250px;
      }

      #toggle-btn {
        left: 268px;
      }
    }
  </style>
</head>

    const golfIcon = L.icon({
      iconUrl: 'https://golf-media.github.io/maps/golf_hole_icon.png',
      iconSize: [45, 45],
      iconAnchor: [22, 22],
      popupAnchor: [0, -45]
    });

    const sidebar = document.getElementById("sidebar");
    const clubList = document.getElementById("club-list");
    const clubSearch = document.getElementById("club-search");
    const clubCountNumber = document.getElementById("club-count-number");

    const bounds = [];
    const items = [];

    clubCountNumber.textContent = clubs.length;

    clubs.forEach((club) => {
      const safeId = escapeHtml(club.id);
      const safeAddr = escapeHtml(club.address);

      const popupHTML =
        '<div class="popup-title">' + safeId + '</div>' +
        '<div class="popup-address">' + safeAddr + '</div>' +
        (club.imglink ? '<img src="' + club.imglink + '" alt="' + safeId + '">' : '');

      const marker = L.marker([club.lat, club.lng], { icon: golfIcon })
        .addTo(map)
        .bindPopup(popupHTML);

      bounds.push([club.lat, club.lng]);

      const item = document.createElement("div");
      item.className = "sidebar-item";
      item.dataset.search = (club.id + " " + club.address).toLowerCase();

      item.innerHTML =
        '<div class="club-name">' + safeId + '</div>' +
        '<div class="club-address">' + safeAddr + '</div>';

      item.onclick = () => {
        document.querySelectorAll(".sidebar-item.active").forEach(el => {
          el.classList.remove("active");
        });

        item.classList.add("active");
        map.setView([club.lat, club.lng], 14);
        marker.openPopup();
      };

      clubList.appendChild(item);
      items.push(item);
    });

    clubSearch.addEventListener("input", () => {
      const query = clubSearch.value.trim().toLowerCase();

      items.forEach(item => {
        item.style.display = item.dataset.search.includes(query) ? "" : "none";
      });
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, {
        paddingTopLeft: [330, 40],
        paddingBottomRight: [40, 40],
        maxZoom: 13
      });
    } else {
      map.setView([50.5039, 4.4699], 8);
    }

    const toggleBtn = document.getElementById("toggle-btn");

    toggleBtn.addEventListener("click", () => {
      sidebar.classList.toggle("closed");
      toggleBtn.textContent = sidebar.classList.contains("closed") ? "›" : "‹";

      setTimeout(() => {
        map.invalidateSize();
      }, 230);
    });
  </script>

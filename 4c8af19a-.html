      transition: left 0.1s ease;

    #sidebar.closed ~ #toggle-btn {

    .sidebar-item {

      padding: 6px;
      margin-bottom: 4px;
      background: white;
      border-radius: 4px;
      border: 1px solid #ddd;
      font-size: 13px;
    }

    .sidebar-item:hover {
      background: #e8f0fe;

    .leaflet-popup-content img {

      border-radius: 6px;

      iconAnchor: [15, 15],
      popupAnchor: [0, -30]
    });

    const sidebar = document.getElementById("sidebar");
    const bounds = [];

    clubs.forEach((club) => {
      const safeId = escapeHtml(club.id);
      const safeAddr = escapeHtml(club.address);

      const popupHTML = '<strong>' + safeId + '</strong><br><p>' + safeAddr + '</p>' +
                        (club.imglink ? '<img src="' + club.imglink + '">' : '');

      const marker = L.marker([club.lat, club.lng], { icon: golfIcon }).addTo(map).bindPopup(popupHTML);
      bounds.push([club.lat, club.lng]);

      const item = document.createElement("div");
      item.className = "sidebar-item";
      item.textContent = club.id;
      item.onclick = () => {
        map.setView([club.lat, club.lng], 14);
        marker.openPopup();
      };
      sidebar.appendChild(item);
    });

    if (bounds.length > 0) {
      map.fitBounds(bounds, { padding: [30, 30] });
    } else {
      map.setView([50.5039, 4.4699], 8);
    }

    const toggleBtn = document.getElementById("toggle-btn");
